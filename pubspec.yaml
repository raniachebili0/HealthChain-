name: health_chain
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  equatable: ^2.0.7
  flutter_bloc: ^9.0.0
  provider: ^6.1.2
  flutter_native_splash: ^2.4.4
  shared_preferences: ^2.5.2
  lottie: ^3.3.1
  auto_route: ^9.3.0+1
  flutter_otp_text_field: ^1.4.0+2
  date_format_field: ^0.1.0
  image_picker: ^1.1.2
  file_picker: ^9.0.0
  flutter_pdfview: ^1.4.0
  open_filex: ^4.6.0
  syncfusion_flutter_pdfviewer: ^22.1.34
  http: ^1.3.0
  curved_navigation_bar: ^1.0.6
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.0.0
  socket_io_client: ^3.0.2
  flutter_webrtc: ^0.9.34
  intl: ^0.18.1
  flutter_local_notifications: ^14.0.0
  flutter_ringtone_player: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.15
  auto_route_generator: ^9.3.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/imeges/
    - assets/logo/
    - assets/animations/

  fonts:
    - family: Verveine
      fonts:
        - asset: fonts/Verveine-Regular.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-VariableFont.ttf
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
    - family: calibri
      fonts:
        - asset: fonts/calibri-regular.ttf